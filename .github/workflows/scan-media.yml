name: Scan media folder

on:
  push:
    branches: [main]
    paths:
      - 'media/**'

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate media.json
        run: |
          python3 << 'EOF'
          import os, json
          IMAGE_EXT = {'jpg','jpeg','png','gif','webp','avif'}
          VIDEO_EXT = {'mp4','webm','mov'}
          files = []
          for f in sorted(os.listdir('media')):
              if f.startswith('.') or f == 'media.json':
                  continue
              ext = f.rsplit('.',1)[-1].lower() if '.' in f else ''
              if ext in IMAGE_EXT:
                  ftype = 'image'
              elif ext in VIDEO_EXT:
                  ftype = 'video'
              else:
                  continue
              files.append({'name': f, 'type': ftype, 'url': '/media/' + f})
          with open('media/media.json','w') as out:
              json.dump({'files': files}, out, indent=2)
          print(f'Scanned {len(files)} media files')
          EOF
      - name: Commit media.json
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add media/media.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: update media.json [skip ci]"
          git push
