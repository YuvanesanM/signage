name: Scan media folder

on:
  push:
    branches: [main]
    paths:
      - 'media/**'

concurrency:
  group: main-auto-commit
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate media.json
        run: |
          python3 << 'EOF'
          import os, json
          IMAGE_EXT = {'jpg','jpeg','png','gif','webp','avif'}
          VIDEO_EXT = {'mp4','webm','mov'}

          def sniff(path):
              """Detect image/video by file signature (magic bytes)."""
              try:
                  with open(path, 'rb') as fh:
                      head = fh.read(16)
              except Exception:
                  return None
              if head[:3] == b'\xff\xd8\xff':                return 'image'   # JPEG
              if head[:8] == b'\x89PNG\r\n\x1a\n':            return 'image'   # PNG
              if head[:6] in (b'GIF87a', b'GIF89a'):         return 'image'   # GIF
              if head[:4] == b'RIFF' and head[8:12] == b'WEBP': return 'image' # WEBP
              if head[4:8] == b'ftyp':                       return 'video'   # MP4/MOV
              if head[:4] == b'\x1aE\xdf\xa3':                return 'video'   # WEBM/MKV
              return None

          files = []
          for f in sorted(os.listdir('media')):
              if f.startswith('.') or f == 'media.json':
                  continue
              path = os.path.join('media', f)
              if not os.path.isfile(path):
                  continue
              ext = f.rsplit('.',1)[-1].lower() if '.' in f else ''
              if ext in IMAGE_EXT:
                  ftype = 'image'
              elif ext in VIDEO_EXT:
                  ftype = 'video'
              else:
                  # No / unknown extension — fall back to content sniffing
                  ftype = sniff(path)
                  if ftype is None:
                      print(f'Skipped (not a recognized media file): {f}')
                      continue
              files.append({'name': f, 'type': ftype, 'url': '/media/' + f})
          with open('media/media.json','w') as out:
              json.dump({'files': files}, out, indent=2)
          print(f'Scanned {len(files)} media files')
          EOF
      - name: Commit media.json
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add media/media.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: update media.json [skip ci]"
          for i in 1 2 3 4 5; do
            git push && exit 0
            echo "Push failed (attempt $i) — rebasing on latest main"
            git pull --rebase origin main
          done
          echo "Push failed after 5 attempts" && exit 1
