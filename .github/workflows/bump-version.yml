name: Bump version on push

on:
  push:
    branches: [main]
    paths-ignore:
      - 'version.json'
      - 'media/**'

concurrency:
  group: main-auto-commit
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Bump patch version
        run: |
          python3 << 'EOF'
          import json, re
          try:
              v = json.load(open('version.json'))['v']
              m = re.match(r'v(\d+)\.(\d+)\.(\d+)', v)
              major, minor, patch = int(m.group(1)), int(m.group(2)), int(m.group(3))
          except:
              major, minor, patch = 1, 0, -1
          patch += 1
          new_v = f'v{major}.{minor}.{patch}'
          json.dump({'v': new_v}, open('version.json','w'))
          print(f'Version: {new_v}')
          EOF
      - name: Commit and push version
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add version.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: bump version [skip ci]"
          for i in 1 2 3 4 5; do
            git push && exit 0
            echo "Push failed (attempt $i) — rebasing on latest main"
            git pull --rebase origin main
          done
          echo "Push failed after 5 attempts" && exit 1
