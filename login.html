<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Studio RYST</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f3f4f1; --panel:#ffffff; --panel2:#f7f8f5;
    --line:#e3e5e0; --accent:#3d9b69; --accent-d:#2f7d54; --accent-soft:#eaf4ee;
    --ink:#1d211c; --muted:#5f655d; --muted2:#9aa097; --danger:#c0584b;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:var(--bg);color:var(--ink);font-family:"Outfit",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer}
  input{font-family:inherit}

  /* ── SHARED LAYOUT ── */
  .view{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:radial-gradient(1100px 560px at 50% -8%,#ffffff 0%,var(--bg) 65%)}
  .view[hidden]{display:none}

  /* ── LOGIN ── */
  .login-card{width:min(380px,100%);background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:34px 32px;text-align:center;box-shadow:0 18px 50px rgba(40,50,40,.10);display:flex;flex-direction:column;gap:14px}
  .login-card img{height:72px;margin:0 auto;display:block;object-fit:contain}
  .login-card img[src=""]{display:none}
  .login-card h1{font-weight:600;font-size:19px;letter-spacing:.2px}
  .login-card p{color:var(--muted);font-size:13px}
  .login-card input{width:100%;padding:13px 14px;border-radius:10px;border:1px solid var(--line);background:var(--panel2);color:var(--ink);font-size:15px;text-align:center;letter-spacing:1px;outline:none}
  .login-card input:focus{border-color:var(--accent)}
  .login-card button{width:100%;padding:13px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-weight:600;font-size:14px;letter-spacing:.3px}
  .login-card button:hover{background:var(--accent-d)}
  .login-err{color:var(--danger);font-size:12.5px;min-height:16px}

  /* ── HOME ── */
  #homeView{gap:36px}
  #homeLogo{max-height:72px;max-width:220px;display:block}
  #homeLogo[src=""]{display:none}
  .home-cards{display:flex;gap:18px;flex-wrap:wrap;justify-content:center}
  .home-card{background:var(--panel);border:1.5px solid var(--line);border-radius:16px;padding:32px 28px;width:210px;display:flex;flex-direction:column;align-items:center;gap:12px;cursor:pointer;transition:.18s;text-align:center;font-family:inherit;color:inherit}
  .home-card:hover{border-color:var(--accent);box-shadow:0 8px 28px rgba(60,100,60,.13);transform:translateY(-3px)}
  .hc-icon{width:52px;height:52px;background:var(--accent-soft);border-radius:13px;display:flex;align-items:center;justify-content:center;color:var(--accent-d)}
  .hc-title{font-size:15px;font-weight:700;color:var(--ink)}
  .hc-sub{font-size:12px;color:var(--muted2);line-height:1.45}
  @media(max-width:480px){.home-cards{flex-direction:column;align-items:center}.home-card{width:min(260px,100%)}}
</style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="loginView" class="view">
  <div class="login-card">
    <img id="loginLogo" alt="Studio RYST" src="">
    <h1>Studio RYST</h1>
    <p>Coordinator access</p>
    <input id="pw" type="password" placeholder="Enter password" autocomplete="current-password" />
    <button id="loginBtn">Unlock</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- ── HOME ── -->
<div id="homeView" class="view" hidden>
  <img id="homeLogo" alt="Studio RYST" src="">
  <div class="home-cards">
    <button class="home-card" onclick="window.location.href='quote.html'">
      <div class="hc-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg></div>
      <span class="hc-title">Quote Builder</span>
      <span class="hc-sub">Create and manage client quotes</span>
    </button>
    <button class="home-card" onclick="window.location.href='quote.html?config=1'">
      <div class="hc-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg></div>
      <span class="hc-title">Rate Card & Settings</span>
      <span class="hc-sub">Update pricing and studio details</span>
    </button>
    <button class="home-card" onclick="window.location.href='set.html'">
      <div class="hc-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
      <span class="hc-title">Schedule Manager</span>
      <span class="hc-sub">View and manage studio bookings</span>
    </button>
  </div>
</div>

<script>
const PROXY_URL = 'https://ryst-signage-proxy.onrender.com';
let proxyToken = localStorage.getItem('ryst_proxy_token') || '';

function setLogos(src){
  ['loginLogo','homeLogo'].forEach(id=>{ const el=document.getElementById(id); if(el) el.src=src; });
}

async function showHome(){
  // Fetch logo from proxy (non-blocking — show home immediately, update logo when ready)
  document.getElementById('loginView').setAttribute('hidden','');
  document.getElementById('homeView').removeAttribute('hidden');
  try{
    const r = await fetch(PROXY_URL+'/rates',{headers:{'X-Token':proxyToken}}).catch(()=>null);
    if(r && r.ok){
      const data = await r.json();
      if(data.logo){ localStorage.setItem('ryst_logo', data.logo); setLogos(data.logo); }
    }
  }catch(e){}
}

async function tryLogin(){
  const pwd = document.getElementById('pw').value; if(!pwd) return;
  const btn = document.getElementById('loginBtn');
  btn.disabled=true; btn.textContent='Verifying…';
  try{
    const res = await fetch(PROXY_URL+'/auth',{method:'POST',
      headers:{'Content-Type':'application/json'}, body:JSON.stringify({password:pwd})});
    const data = await res.json();
    if(data.ok && data.token){
      proxyToken = data.token;
      localStorage.setItem('ryst_proxy_token', data.token);
      showHome();
    } else {
      document.getElementById('loginErr').textContent = data.error||'Incorrect password.';
      document.getElementById('pw').select();
    }
  } catch(e){ document.getElementById('loginErr').textContent='Cannot reach proxy — check connection'; }
  btn.disabled=false; btn.textContent='Unlock';
}

// Apply stored logo immediately (avoids flash on refresh)
const storedLogo = localStorage.getItem('ryst_logo');
if(storedLogo) setLogos(storedLogo);

// Auto-show home if token is valid
(async function bootAuth(){
  if(!proxyToken) return;
  document.getElementById('loginView').style.display='none'; // hide while validating
  const res = await fetch(PROXY_URL+'/quotes',{headers:{'X-Token':proxyToken}}).catch(()=>null);
  if(res && res.ok){
    showHome();
  } else {
    proxyToken=''; localStorage.removeItem('ryst_proxy_token');
    document.getElementById('loginView').style.display=''; // restore
  }
})();

document.getElementById('loginBtn').addEventListener('click', tryLogin);
document.getElementById('pw').addEventListener('keydown', e=>{ if(e.key==='Enter') tryLogin(); });
</script>
</body>
</html>
