<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Studio RYST</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f3f4f1; --panel:#ffffff; --panel2:#f7f8f5;
    --line:#e3e5e0; --accent:#3d9b69; --accent-d:#2f7d54; --accent-soft:#eaf4ee;
    --ink:#1d211c; --muted:#5f655d; --muted2:#9aa097; --danger:#c0584b;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:var(--bg);color:var(--ink);font-family:"Outfit",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer}
  input{font-family:inherit}

  /* ── SHARED LAYOUT ── */
  .view{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:radial-gradient(1100px 560px at 50% -8%,#ffffff 0%,var(--bg) 65%)}
  .view[hidden]{display:none}

  /* ── LOGIN ── */
  .login-card{width:min(380px,100%);background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:34px 32px;text-align:center;box-shadow:0 18px 50px rgba(40,50,40,.10);display:flex;flex-direction:column;gap:14px}
  .login-card img{height:72px;margin:0 auto;display:block;object-fit:contain}
  .login-card img[src=""]{display:none}
  .login-card h1{font-weight:600;font-size:19px;letter-spacing:.2px}
  .login-card p{color:var(--muted);font-size:13px}
  .login-err{color:var(--danger);font-size:12.5px;min-height:16px}

  /* ── HOME ── */
  #homeView{gap:36px}
  #homeLogo{max-height:72px;max-width:220px;display:block}
  #homeLogo[src=""]{display:none}
  .home-cards{display:flex;gap:18px;flex-wrap:wrap;justify-content:center}
  .home-card{background:var(--panel);border:1.5px solid var(--line);border-radius:16px;padding:32px 28px;width:210px;display:flex;flex-direction:column;align-items:center;gap:12px;cursor:pointer;transition:.18s;text-align:center;font-family:inherit;color:inherit}
  .home-card:hover{border-color:var(--accent);box-shadow:0 8px 28px rgba(60,100,60,.13);transform:translateY(-3px)}
  .hc-icon{width:52px;height:52px;background:var(--accent-soft);border-radius:13px;display:flex;align-items:center;justify-content:center;color:var(--accent-d)}
  .hc-title{font-size:15px;font-weight:700;color:var(--ink)}
  .hc-sub{font-size:12px;color:var(--muted2);line-height:1.45}
  .logout-btn{margin-top:8px;background:transparent;border:1.5px solid var(--line);color:var(--muted2);padding:10px 24px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;letter-spacing:.3px;transition:.18s}
  .logout-btn:hover{border-color:var(--danger,#c0584b);color:var(--danger,#c0584b)}
  @media(max-width:600px){
    #homeView{overflow-y:auto;justify-content:flex-start;padding-top:32px;padding-bottom:32px}
    .home-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%}
    .home-card{width:100%;padding:22px 14px;gap:9px}
    .hc-icon{width:42px;height:42px;border-radius:10px}
    .hc-title{font-size:13.5px}
    .hc-sub{font-size:11px}
    #homeLogo{max-height:52px}
  }
</style>
<script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

function applyCustomLogo(){
  try{
    const s = JSON.parse(localStorage.getItem('ryst_quote_settings')||'null');
    if(s && s.logo){ setLogos(s.logo); return; }
  }catch(e){}
  const stored = localStorage.getItem('ryst_logo');
  if(stored) setLogos(stored);
}

function showHome(){
  // Swap views immediately — no network wait
  document.getElementById('loginView').setAttribute('hidden','');
  document.getElementById('loginView').style.display='';
  document.getElementById('homeView').removeAttribute('hidden');
}

// ── Google OAuth ──────────────────────────────────────────────────────────
// Create a Client ID at console.cloud.google.com → APIs & Services → Credentials
// Add https://signage.ryst.in as an Authorised JavaScript origin
const GOOGLE_CLIENT_ID = '717827758789-99ugj40a6j2rr4r7db26shn0hivq0vv0.apps.googleusercontent.com';

async function handleGoogleLogin(credentialResponse) {
  const errEl = document.getElementById('loginErr');
  errEl.textContent = 'Verifying…';
  // The proxy runs on Render's free tier and can cold-start for 30–60s. Keep the
  // user informed, but abort after 70s so the UI never hangs on 'Verifying…'.
  const ctrl = new AbortController();
  const slowTimer = setTimeout(() => {
    errEl.textContent = 'Waking up the server… this can take up to a minute.';
  }, 4000);
  const abortTimer = setTimeout(() => ctrl.abort(), 70000);
  try {
    const res = await fetch(PROXY_URL + '/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ googleIdToken: credentialResponse.credential }),
      signal: ctrl.signal
    });
    const data = await res.json();
    if (data.ok && data.token) {
      proxyToken = data.token;
      localStorage.setItem('ryst_proxy_token', data.token);
      errEl.textContent = '';
      showHome();
    } else {
      errEl.textContent = data.error || 'Access denied.';
    }
  } catch(e) {
    errEl.textContent = (e.name === 'AbortError')
      ? 'Server timed out — please reload and try again.'
      : 'Cannot reach proxy — check connection';
  } finally {
    clearTimeout(slowTimer);
    clearTimeout(abortTimer);
  }
}

// Apply any custom logo immediately (embedded default shows otherwise)
applyCustomLogo();

// If a token exists, show the home screen instantly and validate in the
// background. This avoids a blank page during Render cold starts (the
// /quotes fetch can take 30–60s). We only drop back to the login form on an
// explicit auth rejection (401) — a transient network error keeps the user
// on home, and the tool pages re-validate when opened.
(function bootAuth(){
  if(!proxyToken) return; // no token → stay on the login form
  showHome();
  fetch(PROXY_URL+'/quotes',{headers:{'X-Token':proxyToken}}).then(res=>{
    if(res && res.status===401){
      proxyToken=''; localStorage.removeItem('ryst_proxy_token');
      document.getElementById('homeView').setAttribute('hidden','');
      document.getElementById('loginView').removeAttribute('hidden');
      document.getElementById('loginView').style.display='';
    }
  }).catch(()=>{});
})();

// Render the Google button. Idempotent — safe to call from multiple triggers.
let gsiRendered = false;
function initGoogleSignIn() {
  if (gsiRendered) return;
  if (typeof google === 'undefined' || !google.accounts || !google.accounts.id) return;
  const target = document.getElementById('googleSignInBtn');
  if (!target) return;
  gsiRendered = true;
  google.accounts.id.initialize({
    client_id: GOOGLE_CLIENT_ID,
    callback: handleGoogleLogin,
    auto_select: false,
  });
  google.accounts.id.renderButton(target, { theme: 'outline', size: 'large', width: 316, text: 'signin_with' });
}

// GSI invokes this the moment its library finishes loading — this is the
// reliable trigger when the async script executes AFTER the load event.
window.onGoogleLibraryLoad = initGoogleSignIn;
// Also try on load, in case the library was already present by then.
window.addEventListener('load', initGoogleSignIn);
// If GSI never loads (offline, ad blocker, CSP), surface an error instead of a
// blank card so the user has a recovery path.
setTimeout(() => {
  if (!gsiRendered) {
    const errEl = document.getElementById('loginErr');
    if (errEl) errEl.textContent = 'Could not load Google Sign-In — check your connection or disable ad blockers, then reload.';
  }
}, 8000);

function logout(){
  proxyToken='';
  localStorage.removeItem('ryst_proxy_token');
  document.getElementById('homeView').setAttribute('hidden','');
  document.getElementById('loginView').removeAttribute('hidden');
  document.getElementById('loginView').style.display='';
  try { google.accounts.id.disableAutoSelect(); } catch(e) {}
}
document.getElementById('logoutBtn').addEventListener('click', logout);
</script>
